name: CI

# Runs on every push and pull request. Blocks broken code from reaching a
# deploy by type-checking the project the same way `next build` does, but
# without needing runtime env vars (Supabase/Stripe keys).
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  typecheck:
    name: Type check & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        continue-on-error: true
